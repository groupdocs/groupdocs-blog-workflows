name: Weekly Validate Translations

on:
  schedule:
    # Run every Sunday at 7:00 AM UTC
    - cron: '0 7 * * 0'
  workflow_dispatch:

jobs:
  validate:
    runs-on: self-hosted
    permissions:
      contents: write
      actions: write
    steps:
      - name: Checkout blog-workflows repo
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.REPO_PAT }}

      - name: Record start time
        id: start_time
        run: echo "start_ms=$(date +%s%3N)" >> $GITHUB_OUTPUT

      - name: Checkout GroupDocs Blog repo
        shell: bash
        env:
          REPO_PAT: ${{ secrets.REPO_PAT }}
        run: |
          set -euo pipefail
          BLOG_REPO_URL="https://x-access-token:${REPO_PAT}@github.com/groupdocs/groupdocs-blog.git"
          git clone --depth 1 "${BLOG_REPO_URL}" blog-repo
          cd blog-repo
          git submodule update --init --recursive
          cd ..

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.9'

      - name: Install dependencies
        run: |
          pip install -r tools/translation-validator/requirements.txt
          pip install -r tools/blog-post-translator/requirements.txt
          pip install -r tools/redmine-activity-reporter/requirements.txt

      - name: Validate existing translations
        id: validate
        run: |
          set -euo pipefail

          python tools/translation-validator/validate_translations.py \
            --content blog-repo/content \
            --output validation_report.json \
            --verbose 2>&1 | tee validation_output.txt || true

          # Check if retranslation is needed
          posts_to_fix=$(python -c "import json; report = json.load(open('validation_report.json')); print(report['summary']['posts_needing_retranslation'])")
          if [ "$posts_to_fix" -gt "0" ]; then
            echo "needs_retranslation=true" >> $GITHUB_OUTPUT
            echo "posts_to_fix=$posts_to_fix" >> $GITHUB_OUTPUT
          else
            echo "needs_retranslation=false" >> $GITHUB_OUTPUT
          fi

      - name: Log validation results to Redmine
        if: steps.validate.outputs.needs_retranslation == 'true'
        env:
          REDMINE_ENDPOINT: ${{ secrets.REDMINE_ENDPOINT }}
          REDMINE_API_KEY: ${{ secrets.REDMINE_API_KEY }}
          REDMINE_ISSUE_ID: ${{ secrets.REDMINE_ISSUE_ID_BLOG_LOCALIZATION }}
          REDMINE_ACTIVITY_ID: ${{ secrets.REDMINE_ACTIVITY_ID_LOCALIZATION }}
          REDMINE_REPORT_TO_USER: ${{ secrets.REDMINE_REPORT_TO_USER }}
          REDMINE_HOURS: 1.0
        run: |
          set -euo pipefail

          # Generate Redmine comment listing posts to retranslate
          python tools/translation-validator/create_validation_redmine_comment.py \
            --report-json validation_report.json \
            --output redmine_comment.txt

          # Generate short time entry comment (Redmine has character limit on time entries)
          posts_to_fix=${{ steps.validate.outputs.posts_to_fix }}
          echo "Translation quality validation: ${posts_to_fix} posts flagged for retranslation" > redmine_time_comment.txt

          # Add comment and log time
          python tools/blog-post-translator/log_to_redmine.py

      - name: Retranslate flagged posts
        if: steps.validate.outputs.needs_retranslation == 'true'
        id: retranslate
        env:
          PROFESSIONALIZE_API_KEY: ${{ secrets.PROFESSIONALIZE_API_KEY }}
          PROFESSIONALIZE_API_URL: ${{ secrets.PROFESSIONALIZE_API_URL }}
          PROFESSIONALIZE_MODEL_NAME: ${{ secrets.PROFESSIONALIZE_MODEL_NAME }}
          PROFESSIONALIZE_REVIEWER_MODEL: ${{ secrets.PROFESSIONALIZE_REVIEWER_MODEL }}
        run: |
          set -euo pipefail

          cd blog-repo
          python ../tools/blog-post-translator/translate_posts.py \
            ../validation_report.json \
            --verbose 2>&1 | tee ../retranslation_output.txt || true
          cd ..

          # Process output to check if translations were made
          set +e
          python tools/blog-post-translator/process_translation_output.py \
            --input retranslation_output.txt \
            --output retranslated_posts.json \
            --scan-report validation_report.json
          retranslated_exit=$?
          set -e

          if [ "$retranslated_exit" -eq "0" ]; then
            echo "retranslated=true" >> $GITHUB_OUTPUT
          else
            echo "retranslated=false" >> $GITHUB_OUTPUT
          fi

      - name: Commit retranslated posts to blog repo
        if: steps.retranslate.outputs.retranslated == 'true'
        shell: bash
        env:
          REPO_PAT: ${{ secrets.REPO_PAT }}
        working-directory: blog-repo
        run: |
          set -euo pipefail
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git config user.name "github-actions[bot]"
          git remote set-url origin https://x-access-token:${REPO_PAT}@github.com/groupdocs/groupdocs-blog.git
          git add -A
          if git diff --cached --quiet; then
            echo "No changes to commit"
          else
            git commit -m "fix: retranslate posts flagged by quality validation (automated)"
            git push origin HEAD
          fi

      - name: Commit validation report
        shell: bash
        env:
          REPO_PAT: ${{ secrets.REPO_PAT }}
        run: |
          set -euo pipefail
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git config user.name "github-actions[bot]"
          git remote set-url origin https://x-access-token:${REPO_PAT}@github.com/${{ github.repository }}.git
          git add validation_report.json
          if git diff --cached --quiet; then
            echo "No changes to commit"
          else
            git commit -m "chore: update translation validation report"
            git push origin HEAD
          fi

      - name: Log to Redmine
        if: steps.retranslate.outputs.retranslated == 'true'
        env:
          REDMINE_ENDPOINT: ${{ secrets.REDMINE_ENDPOINT }}
          REDMINE_API_KEY: ${{ secrets.REDMINE_API_KEY }}
          REDMINE_ISSUE_ID: ${{ secrets.REDMINE_ISSUE_ID_BLOG_LOCALIZATION }}
          REDMINE_ACTIVITY_ID: ${{ secrets.REDMINE_ACTIVITY_ID_LOCALIZATION }}
          REDMINE_REPORT_TO_USER: ${{ secrets.REDMINE_REPORT_TO_USER }}
          REDMINE_HOURS: 1.0
        run: |
          set -euo pipefail

          python tools/blog-post-translator/create_redmine_comment.py \
            --posts-json retranslated_posts.json \
            --output redmine_comment.txt

          python tools/blog-post-translator/create_simplified_time_comment.py \
            --posts-json retranslated_posts.json \
            --output redmine_time_comment.txt

          python tools/blog-post-translator/log_to_redmine.py

      - name: Trigger deploy-qa workflow
        if: steps.retranslate.outputs.retranslated == 'true'
        env:
          REPO_PAT: ${{ secrets.REPO_PAT }}
        run: |
          curl -L \
            -X POST \
            -H "Accept: application/vnd.github+json" \
            -H "Authorization: Bearer ${REPO_PAT}" \
            -H "X-GitHub-Api-Version: 2022-11-28" \
            https://api.github.com/repos/groupdocs/groupdocs-blog-workflows/actions/workflows/deploy-qa.yml/dispatches \
            -d '{"ref":"main"}'

      - name: Trigger deploy-prod workflow
        if: steps.retranslate.outputs.retranslated == 'true'
        env:
          REPO_PAT: ${{ secrets.REPO_PAT }}
        run: |
          curl -L \
            -X POST \
            -H "Accept: application/vnd.github+json" \
            -H "Authorization: Bearer ${REPO_PAT}" \
            -H "X-GitHub-Api-Version: 2022-11-28" \
            https://api.github.com/repos/groupdocs/groupdocs-blog-workflows/actions/workflows/deploy-prod.yml/dispatches \
            -d '{"ref":"main"}'

      - name: Report metrics
        if: always()
        env:
          AGENT_METRICS_ENDPOINT: ${{ secrets.AGENT_METRICS_ENDPOINT }}
        run: |
          set +e
          END_MS=$(date +%s%3N)
          START_MS=${{ steps.start_time.outputs.start_ms }}
          if [ -n "$START_MS" ]; then
            DURATION_MS=$((END_MS - START_MS))
          else
            DURATION_MS=0
          fi

          TOKEN_USAGE=0
          API_CALLS=0
          DISCOVERED=0
          SUCCEEDED=0
          FAILED=0

          if [ -f validation_report.json ]; then
            DISCOVERED=$(python -c "import json; print(json.load(open('validation_report.json'))['summary']['total_translations_checked'])" 2>/dev/null || echo "0")
            SUCCEEDED=$(python -c "import json; print(json.load(open('validation_report.json'))['summary']['valid_translations'])" 2>/dev/null || echo "0")
            FAILED=$(python -c "import json; print(json.load(open('validation_report.json'))['summary']['invalid_translations'])" 2>/dev/null || echo "0")
            STATUS="success"
          else
            STATUS="failure"
          fi

          # Pick up token metrics from retranslation if it ran
          if [ -f blog-repo/translation_metrics.json ]; then
            TOKEN_USAGE=$(python -c "import json; print(json.load(open('blog-repo/translation_metrics.json')).get('token_usage',0))" 2>/dev/null || echo "0")
            API_CALLS=$(python -c "import json; print(json.load(open('blog-repo/translation_metrics.json')).get('api_calls_count',0))" 2>/dev/null || echo "0")
          fi

          python tools/agent-metrics-reporter/report_metrics.py \
            --agent-name "Docs Translator" \
            --job-type "Docs Translation" \
            --status "$STATUS" \
            --run-id "validate_translations_${{ github.run_id }}" \
            --item-name "Translation" \
            --items-discovered "$DISCOVERED" \
            --items-succeeded "$SUCCEEDED" \
            --items-failed "$FAILED" \
            --run-duration-ms "$DURATION_MS" \
            --token-usage "$TOKEN_USAGE" \
            --api-calls-count "$API_CALLS" || true
