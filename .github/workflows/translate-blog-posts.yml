name: Daily Translate Blog Posts

on:
  schedule:
    # Run every day at 6:10 AM UTC (10 minutes after scan-missing-translations)
    - cron: '10 6 * * *'
  workflow_dispatch:

jobs:
  translate:
    runs-on: self-hosted
    permissions:
      contents: write
      actions: write
    steps:
      - name: Checkout blog-workflows repo
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.REPO_PAT }}

      - name: Record start time
        id: start_time
        run: echo "start_ms=$(date +%s%3N)" >> $GITHUB_OUTPUT

      - name: Checkout GroupDocs Blog repo
        shell: bash
        env:
          REPO_PAT: ${{ secrets.REPO_PAT }}
        run: |
          set -euo pipefail
          BLOG_REPO_URL="https://x-access-token:${REPO_PAT}@github.com/groupdocs/groupdocs-blog.git"
          git clone --depth 1 "${BLOG_REPO_URL}" blog-repo
          cd blog-repo
          git submodule update --init --recursive
          cd ..

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.9'

      - name: Install translator dependencies
        run: |
          pip install -r tools/blog-post-translator/requirements.txt
          pip install -r tools/redmine-activity-reporter/requirements.txt

      - name: Translate blog posts
        id: translate
        env:
          PROFESSIONALIZE_API_KEY: ${{ secrets.PROFESSIONALIZE_API_KEY }}
          PROFESSIONALIZE_API_URL: ${{ secrets.PROFESSIONALIZE_API_URL }}
          PROFESSIONALIZE_MODEL_NAME: ${{ secrets.PROFESSIONALIZE_MODEL_NAME }}
          PROFESSIONALIZE_REVIEWER_MODEL: ${{ secrets.PROFESSIONALIZE_REVIEWER_MODEL }}
        run: |
          set -euo pipefail

          # Translate 1 post (working directory is blog-repo)
          cd blog-repo
          # Run translation script and capture output
          # Use tee to both save to file and show in console
          python ../tools/blog-post-translator/translate_posts.py \
            ../translations_scan_report.json \
            --limit 1 --verbose 2>&1 | tee ../translation_output.txt || true
          cd ..
          
          # Show translation output for debugging
          echo "=== Translation Output ==="
          cat translation_output.txt || true
          echo "========================"
          
          # Process translation output and extract translated posts
          set +e
          python tools/blog-post-translator/process_translation_output.py \
            --input translation_output.txt \
            --output translated_posts.json \
            --scan-report translations_scan_report.json
          translated_exit=$?
          set -e
          
          # Set output variable based on script exit code
          if [ "$translated_exit" -eq "0" ]; then
            echo "translated=true" >> $GITHUB_OUTPUT
          else
            echo "translated=false" >> $GITHUB_OUTPUT
          fi

      - name: Commit changes to blog repo
        if: steps.translate.outputs.translated == 'true'
        shell: bash
        env:
          REPO_PAT: ${{ secrets.REPO_PAT }}
        working-directory: blog-repo
        run: |
          set -euo pipefail
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git config user.name "github-actions[bot]"
          git remote set-url origin https://x-access-token:${REPO_PAT}@github.com/groupdocs/groupdocs-blog.git
          git add -A
          if git diff --cached --quiet; then
            echo "No changes to commit"
          else
            git commit -m "chore: translate blog posts (automated)"
            git push origin HEAD
          fi

      - name: Log to Redmine
        if: steps.translate.outputs.translated == 'true'
        env:
          REDMINE_ENDPOINT: ${{ secrets.REDMINE_ENDPOINT }}
          REDMINE_API_KEY: ${{ secrets.REDMINE_API_KEY }}
          REDMINE_ISSUE_ID: ${{ secrets.REDMINE_ISSUE_ID_BLOG_LOCALIZATION }}
          REDMINE_ACTIVITY_ID: ${{ secrets.REDMINE_ACTIVITY_ID_LOCALIZATION }}
          REDMINE_REPORT_TO_USER: ${{ secrets.REDMINE_REPORT_TO_USER }}
          REDMINE_HOURS: 1.0
        run: |
          set -euo pipefail
          
          # Generate full Redmine comment from translated posts and save to file
          python tools/blog-post-translator/create_redmine_comment.py \
            --posts-json translated_posts.json \
            --output redmine_comment.txt
          
          # Generate simplified time comment with just URLs
          python tools/blog-post-translator/create_simplified_time_comment.py \
            --posts-json translated_posts.json \
            --output redmine_time_comment.txt
          
          # Add full comment to the issue and log time with simplified comment
          python tools/blog-post-translator/log_to_redmine.py

      - name: Trigger deploy-qa workflow
        if: steps.translate.outputs.translated == 'true'
        env:
          REPO_PAT: ${{ secrets.REPO_PAT }}
        run: |
          curl -L \
            -X POST \
            -H "Accept: application/vnd.github+json" \
            -H "Authorization: Bearer ${REPO_PAT}" \
            -H "X-GitHub-Api-Version: 2022-11-28" \
            https://api.github.com/repos/groupdocs/groupdocs-blog-workflows/actions/workflows/deploy-qa.yml/dispatches \
            -d '{"ref":"main"}'

      - name: Trigger deploy-prod workflow
        if: steps.translate.outputs.translated == 'true'
        env:
          REPO_PAT: ${{ secrets.REPO_PAT }}
        run: |
          curl -L \
            -X POST \
            -H "Accept: application/vnd.github+json" \
            -H "Authorization: Bearer ${REPO_PAT}" \
            -H "X-GitHub-Api-Version: 2022-11-28" \
            https://api.github.com/repos/groupdocs/groupdocs-blog-workflows/actions/workflows/deploy-prod.yml/dispatches \
            -d '{"ref":"main"}'

      - name: Report metrics
        if: always()
        env:
          AGENT_METRICS_ENDPOINT: ${{ secrets.AGENT_METRICS_ENDPOINT }}
        run: |
          set +e
          END_MS=$(date +%s%3N)
          START_MS=${{ steps.start_time.outputs.start_ms }}
          if [ -n "$START_MS" ]; then
            DURATION_MS=$((END_MS - START_MS))
          else
            DURATION_MS=0
          fi

          TOKEN_USAGE=0
          API_CALLS=0
          DISCOVERED=0
          SUCCEEDED=0
          FAILED=0

          # Read all metrics from translation_metrics.json (written by translate_posts.py)
          METRICS_FILE="blog-repo/translation_metrics.json"
          if [ -f "$METRICS_FILE" ]; then
            SUCCEEDED=$(python -c "import json; print(json.load(open('$METRICS_FILE')).get('items_translated',0))" 2>/dev/null || echo "0")
            FAILED=$(python -c "import json; print(json.load(open('$METRICS_FILE')).get('items_failed',0))" 2>/dev/null || echo "0")
            DISCOVERED=$((SUCCEEDED + FAILED))
            TOKEN_USAGE=$(python -c "import json; print(json.load(open('$METRICS_FILE')).get('token_usage',0))" 2>/dev/null || echo "0")
            API_CALLS=$(python -c "import json; print(json.load(open('$METRICS_FILE')).get('api_calls_count',0))" 2>/dev/null || echo "0")
          fi

          # Determine status from step outcome, not from translated flag
          if [ "${{ steps.translate.outcome }}" = "failure" ]; then
            STATUS="failure"
          else
            STATUS="success"
          fi

          python tools/agent-metrics-reporter/report_metrics.py \
            --agent-name "Blog Post Translator Agent" \
            --job-type "Blog Translation" \
            --status "$STATUS" \
            --run-id "translate_posts_${{ github.run_id }}" \
            --item-name "Translation" \
            --items-discovered "$DISCOVERED" \
            --items-succeeded "$SUCCEEDED" \
            --items-failed "$FAILED" \
            --run-duration-ms "$DURATION_MS" \
            --token-usage "$TOKEN_USAGE" \
            --api-calls-count "$API_CALLS" || true