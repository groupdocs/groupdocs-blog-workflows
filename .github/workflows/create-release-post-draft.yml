name: Create release post draft

on:
  workflow_dispatch:
    inputs:
      version:
        description: "Product version (e.g., 25.12)"
        required: true
        type: string
        default: "26.3"
      title:
        description: "Cover title (e.g., December 2025 release)"
        required: true
        type: string
        default: "March 2026 release"
      product_name:
        description: "Product name (e.g., GroupDocs.Viewer)"
        required: true
        type: choice
        options:
          - GroupDocs.Annotation
          - GroupDocs.Assembly
          - GroupDocs.Classification
          - GroupDocs.Comparison
          - GroupDocs.Conversion
          - GroupDocs.Editor
          - GroupDocs.Markdown
          - GroupDocs.Merger
          - GroupDocs.Metadata
          - GroupDocs.Parser
          - GroupDocs.Redaction
          - GroupDocs.Search
          - GroupDocs.Signature
          - GroupDocs.Total
          - GroupDocs.Viewer
          - GroupDocs.Watermark
        default: GroupDocs.Viewer
      platform:
        description: "Platform"
        required: true
        type: choice
        options:
          - .NET
          - .NET UI
          - Java
          - Node.js
          - Python
        default: .NET
      release_notes_url:
        description: "Public release notes URL"
        required: true
        type: string

      publish_to_blog_repo:
        description: "Commit draft to groupdocs-blog repo"
        type: boolean
        default: true

jobs:
  create:
    name: "Draft for ${{ github.event.inputs.product_name }} for ${{ github.event.inputs.platform }} v${{ github.event.inputs.version }}"
    runs-on: self-hosted
    permissions:
      contents: read
      actions: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.REPO_PAT }}

      - name: Set up Python 3.9.5
        uses: actions/setup-python@v5
        with:
          python-version: '3.9.5'
          cache: 'pip'
          cache-dependency-path: |
            tools/public-release-post-cover/requirements.txt
            tools/public-release-post-draft/requirements.txt

      - name: Record start time
        id: start_time
        run: echo "start_ms=$(date +%s%3N)" >> $GITHUB_OUTPUT

      - name: Build product full name
        id: build_name
        run: |
          FULL_NAME="${{ github.event.inputs.product_name }} for ${{ github.event.inputs.platform }}"
          echo "full_name=$FULL_NAME" >> "$GITHUB_OUTPUT"

      - name: Set date and slugs
        id: slugs
        shell: bash
        run: |
          set -euo pipefail
          VERSION_SLUG="${{ github.event.inputs.version }}"; VERSION_SLUG=${VERSION_SLUG//./-}
          PLATFORM_LABEL="${{ github.event.inputs.platform }}"
          case "$PLATFORM_LABEL" in
            ".NET") PLATFORM_SLUG="net" ;;
            ".NET UI") PLATFORM_SLUG="net-ui" ;;
            "Java") PLATFORM_SLUG="java" ;;
            "Node.js") PLATFORM_SLUG="node-js" ;;
            "Python") PLATFORM_SLUG="python" ;;
            *) PLATFORM_SLUG=$(echo "$PLATFORM_LABEL" | tr '[:upper:]' '[:lower:]' | sed -E 's/[^a-z0-9]+/-/g; s/-+/-/g; s/^-|-$//g') ;;
          esac
          PRODUCT_SHORT="${{ github.event.inputs.product_name }}"
          FAMILY=$(echo "$PRODUCT_SHORT" | awk -F'.' '{print tolower($NF)}')
          NAME_SLUG="groupdocs-${FAMILY}-for-${PLATFORM_SLUG}-${VERSION_SLUG}"
          ROOT_DATE=$(date +%F)
          ROOT_DIR="${ROOT_DATE}-groupdocs-${FAMILY}-for-${PLATFORM_SLUG}-${VERSION_SLUG}"
          echo "version_slug=$VERSION_SLUG" >> "$GITHUB_OUTPUT"
          echo "platform_slug=$PLATFORM_SLUG" >> "$GITHUB_OUTPUT"
          echo "family=$FAMILY" >> "$GITHUB_OUTPUT"
          echo "name_slug=$NAME_SLUG" >> "$GITHUB_OUTPUT"
          echo "root_dir=$ROOT_DIR" >> "$GITHUB_OUTPUT"

      - name: Set up Python venv (cover)
        working-directory: tools/public-release-post-cover
        run: |
          python -m venv .venv
          source .venv/bin/activate
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Generate cover image
        working-directory: tools/public-release-post-cover
        run: |
          source .venv/bin/activate
          python generate_cover.py \
            --product "${{ steps.build_name.outputs.full_name }}" \
            --version "${{ github.event.inputs.version }}" \
            --title "${{ github.event.inputs.title }}" \
            --output ""

      - name: Set up Python venv (draft)
        working-directory: tools/public-release-post-draft
        run: |
          python -m venv .venv
          source .venv/bin/activate
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Install Redmine dependencies
        run: |
          pip install -r tools/redmine-activity-reporter/requirements.txt

      - name: Generate draft index.md
        working-directory: tools/public-release-post-draft
        env:
          PROFESSIONALIZE_API_KEY: ${{ secrets.PROFESSIONALIZE_API_KEY }}
          PROFESSIONALIZE_API_URL: ${{ secrets.PROFESSIONALIZE_API_URL }}
          PROFESSIONALIZE_MODEL_NAME: ${{ secrets.PROFESSIONALIZE_MODEL_NAME }}
          PROFESSIONALIZE_REVIEWER_MODEL: ${{ secrets.PROFESSIONALIZE_REVIEWER_MODEL }}
          LOG_LEVEL: INFO
        run: |
          source .venv/bin/activate
          python create_draft.py \
            --product "${{ steps.build_name.outputs.full_name }}" \
            --version "${{ github.event.inputs.version }}" \
            --title "${{ github.event.inputs.title }}" \
            --release-notes "${{ github.event.inputs.release_notes_url }}"

      - name: Assemble release post folder
        shell: bash
        run: |
          set -euo pipefail
          ROOT="${{ steps.slugs.outputs.root_dir }}"
          NAME_SLUG="${{ steps.slugs.outputs.name_slug }}"
          mkdir -p "$ROOT/images"
          # Copy draft index.md
          cp tools/public-release-post-draft/output/index.md "$ROOT/index.md"
          # Move and rename the generated cover to expected name
          CANDIDATE=$(ls tools/public-release-post-cover/output/*.png | head -n1)
          if [ -z "$CANDIDATE" ]; then
            echo "No cover image found" >&2
            exit 1
          fi
          cp "$CANDIDATE" "$ROOT/images/${NAME_SLUG}.png"
          echo "Assembled: $ROOT"
          find "$ROOT" -maxdepth 2 -type f -print

      - name: Log to Redmine
        env:
          REDMINE_ENDPOINT: ${{ secrets.REDMINE_ENDPOINT }}
          REDMINE_API_KEY: ${{ secrets.REDMINE_API_KEY }}
          REDMINE_ISSUE_ID: ${{ secrets.REDMINE_ISSUE_ID_RELEASE_POST_DRAFT }}
          REDMINE_ACTIVITY_ID: ${{ secrets.REDMINE_ACTIVITY_ID_DEVELOPMENT }}
          REDMINE_REPORT_TO_USER: ${{ secrets.REDMINE_REPORT_TO_USER }}
        run: |
          set -euo pipefail
          
          # Generate full Redmine comment from draft and save to file
          python tools/public-release-post-draft/create_redmine_comment.py \
            --index-md "${{ steps.slugs.outputs.root_dir }}/index.md" \
            --product-name "${{ steps.build_name.outputs.full_name }}" \
            --version "${{ github.event.inputs.version }}" \
            --output redmine_comment.txt
          
          # Generate simplified time comment with post URL
          python tools/public-release-post-draft/create_simplified_time_comment.py \
            --index-md "${{ steps.slugs.outputs.root_dir }}/index.md" \
            --output redmine_time_comment.txt
          
          # Add full comment to the issue and log time with simplified comment
          python tools/blog-post-translator/log_to_redmine.py

      - name: Prepare artifacts
        shell: bash
        run: |
          set -euo pipefail
          ROOT="${{ steps.slugs.outputs.root_dir }}"
          mkdir -p artifacts
          cp -R "$ROOT" "artifacts/"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: release-post-draft
          path: artifacts
          if-no-files-found: error

      - name: Comit draft to blog repo
        if: ${{ github.event.inputs.publish_to_blog_repo == 'true' }}
        id: publish_blog
        shell: bash
        env:
          REPO_PAT: ${{ secrets.REPO_PAT }}
        run: |
          set -euo pipefail
          ROOT="${{ steps.slugs.outputs.root_dir }}"
          FAMILY="${{ steps.slugs.outputs.family }}"
          BLOG_REPO_URL="https://x-access-token:${REPO_PAT}@github.com/groupdocs/groupdocs-blog.git"

          workdir=$(mktemp -d)
          echo "Working directory: ${workdir}"
          git clone --depth 1 "${BLOG_REPO_URL}" "${workdir}/blog"

          cd "${workdir}/blog"
          TARGET_DIR="content/Groupdocs.Blog/${FAMILY}"
          mkdir -p "${TARGET_DIR}"

          # Copy the assembled draft folder into the blog repo
          cp -R "${GITHUB_WORKSPACE}/${ROOT}" "${TARGET_DIR}/"

          git config user.email "github-actions[bot]@users.noreply.github.com"
          git config user.name "github-actions[bot]"

          git add -A
          if git diff --cached --quiet; then
            echo "No changes to commit"
          else
            git commit -m "Add draft ${ROOT} for ${{ steps.build_name.outputs.full_name }} v${{ github.event.inputs.version }}"
            git push origin HEAD
          fi

      - name: Deploy to blog-qa.groupdocs.com
        if: ${{ github.event.inputs.publish_to_blog_repo == 'true' }}
        env:
          REPO_PAT: ${{ secrets.REPO_PAT }}
        run: |
          curl -L \
            -X POST \
            -H "Accept: application/vnd.github+json" \
            -H "Authorization: Bearer ${REPO_PAT}" \
            -H "X-GitHub-Api-Version: 2022-11-28" \
            https://api.github.com/repos/groupdocs/groupdocs-blog-workflows/actions/workflows/deploy-qa.yml/dispatches \
            -d '{"ref":"main"}'

      - name: Report metrics
        if: always()
        env:
          AGENT_METRICS_ENDPOINT: ${{ secrets.AGENT_METRICS_ENDPOINT }}
        run: |
          set +e
          END_MS=$(date +%s%3N)
          START_MS=${{ steps.start_time.outputs.start_ms }}
          if [ -n "$START_MS" ]; then
            DURATION_MS=$((END_MS - START_MS))
          else
            DURATION_MS=0
          fi

          TOKEN_USAGE=0
          API_CALLS=0

          ROOT="${{ steps.slugs.outputs.root_dir }}"
          if [ -n "$ROOT" ] && [ -f "$ROOT/index.md" ]; then
            STATUS="success"
            SUCCEEDED=1
            FAILED=0
          else
            STATUS="failure"
            SUCCEEDED=0
            FAILED=1
          fi

          if [ -f tools/public-release-post-draft/output/draft_metrics.json ]; then
            TOKEN_USAGE=$(python -c "import json; print(json.load(open('tools/public-release-post-draft/output/draft_metrics.json')).get('token_usage', 0))" 2>/dev/null || echo "0")
            API_CALLS=$(python -c "import json; print(json.load(open('tools/public-release-post-draft/output/draft_metrics.json')).get('api_calls_count', 0))" 2>/dev/null || echo "0")
          fi

          python tools/agent-metrics-reporter/report_metrics.py \
            --agent-name "Content Enhancer" \
            --job-type "Content Enhancement" \
            --status "$STATUS" \
            --run-id "release_post_draft_${{ github.run_id }}" \
            --product "${{ github.event.inputs.product_name }}" \
            --platform "${{ github.event.inputs.platform }}" \
            --item-name "Pages" \
            --items-discovered 1 \
            --items-succeeded "$SUCCEEDED" \
            --items-failed "$FAILED" \
            --run-duration-ms "$DURATION_MS" \
            --token-usage "$TOKEN_USAGE" \
            --api-calls-count "$API_CALLS" || true
